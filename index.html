<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator - Multi Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            }
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div id="app" x-data="aiGenerator()" class="min-h-full">
        <!-- Header -->
        <header class="bg-black/20 backdrop-blur-lg border-b border-white/10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-6">
                    <div class="flex items-center">
                        <div class="bg-gradient-to-r from-purple-500 to-pink-500 p-3 rounded-xl">
                            <i class="fas fa-robot text-white text-2xl"></i>
                        </div>
                        <div class="ml-4">
                            <h1 class="text-2xl font-bold text-white">AI Generator</h1>
                            <p class="text-purple-300">Multi Model AI Platform</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm">
                            <i class="fas fa-circle text-xs mr-2"></i>Online
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Model Selection -->
            <div class="bg-white/5 backdrop-blur-lg rounded-2xl p-6 mb-8 border border-white/10">
                <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <i class="fas fa-brain mr-3 text-purple-400"></i>
                    Pilih Model AI
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <template x-for="model in models" :key="model.id">
                        <div 
                            @click="selectedModel = model.id" 
                            :class="selectedModel === model.id ? 'bg-purple-500/30 border-purple-400' : 'bg-white/5 border-white/10 hover:bg-white/10'"
                            class="p-4 rounded-xl border-2 cursor-pointer transition-all duration-300 group"
                        >
                            <div class="flex items-center justify-between mb-2">
                                <div :class="model.color" class="p-2 rounded-lg">
                                    <i :class="model.icon" class="text-white"></i>
                                </div>
                                <span x-show="selectedModel === model.id" class="text-purple-400">
                                    <i class="fas fa-check-circle"></i>
                                </span>
                            </div>
                            <h3 class="font-semibold text-white" x-text="model.name"></h3>
                            <p class="text-sm text-gray-300 mt-1" x-text="model.description"></p>
                            <div class="flex items-center mt-2">
                                <span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded">
                                    Free Tier
                                </span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Input Panel -->
                <div class="lg:col-span-2">
                    <div class="bg-white/5 backdrop-blur-lg rounded-2xl p-6 border border-white/10">
                        <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                            <i class="fas fa-pen-fancy mr-3 text-blue-400"></i>
                            Input Prompt
                        </h2>
                        
                        <!-- Prompt Templates -->
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-300 mb-2">Template Prompt</label>
                            <div class="flex flex-wrap gap-2 mb-3">
                                <template x-for="template in promptTemplates" :key="template.id">
                                    <button 
                                        @click="prompt = template.prompt"
                                        class="px-3 py-1 bg-purple-500/20 text-purple-300 rounded-lg text-sm hover:bg-purple-500/30 transition-colors"
                                        x-text="template.name"
                                    ></button>
                                </template>
                            </div>
                        </div>

                        <!-- Main Input -->
                        <div class="mb-4">
                            <textarea 
                                x-model="prompt" 
                                placeholder="Masukkan prompt Anda di sini..."
                                class="w-full h-32 bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none"
                            ></textarea>
                        </div>

                        <!-- Settings -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">Temperature</label>
                                <input 
                                    type="range" 
                                    x-model="settings.temperature" 
                                    min="0" 
                                    max="1" 
                                    step="0.1"
                                    class="w-full accent-purple-500"
                                >
                                <span class="text-xs text-gray-400" x-text="settings.temperature"></span>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">Max Tokens</label>
                                <input 
                                    type="range" 
                                    x-model="settings.maxTokens" 
                                    min="50" 
                                    max="2000" 
                                    step="50"
                                    class="w-full accent-purple-500"
                                >
                                <span class="text-xs text-gray-400" x-text="settings.maxTokens"></span>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">Top P</label>
                                <input 
                                    type="range" 
                                    x-model="settings.topP" 
                                    min="0" 
                                    max="1" 
                                    step="0.1"
                                    class="w-full accent-purple-500"
                                >
                                <span class="text-xs text-gray-400" x-text="settings.topP"></span>
                            </div>
                        </div>

                        <!-- Generate Button -->
                        <button 
                            @click="generateResponse()" 
                            :disabled="!prompt.trim() || isLoading"
                            :class="isLoading ? 'opacity-50 cursor-not-allowed' : 'hover:shadow-lg hover:shadow-purple-500/25'"
                            class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-300 flex items-center justify-center"
                        >
                            <template x-if="isLoading">
                                <div class="flex items-center">
                                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    Generating...
                                </div>
                            </template>
                            <template x-if="!isLoading">
                                <div class="flex items-center">
                                    <i class="fas fa-magic mr-2"></i>
                                    Generate AI Response
                                </div>
                            </template>
                        </button>
                    </div>
                </div>

                <!-- Output Panel -->
                <div class="lg:col-span-1">
                    <div class="bg-white/5 backdrop-blur-lg rounded-2xl p-6 border border-white/10 h-fit">
                        <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                            <i class="fas fa-robot mr-3 text-green-400"></i>
                            AI Response
                        </h2>
                        
                        <div x-show="!response && !isLoading" class="text-center py-8">
                            <i class="fas fa-comment-dots text-4xl text-gray-600 mb-4"></i>
                            <p class="text-gray-400">Response akan muncul di sini</p>
                        </div>

                        <div x-show="isLoading" class="text-center py-8">
                            <div class="animate-pulse-slow">
                                <i class="fas fa-brain text-4xl text-purple-400 mb-4"></i>
                            </div>
                            <p class="text-purple-300">AI sedang berpikir...</p>
                        </div>

                        <div x-show="response" class="space-y-4">
                            <div class="bg-black/20 rounded-xl p-4 border border-white/10">
                                <p class="text-white whitespace-pre-wrap" x-text="response"></p>
                            </div>
                            
                            <div class="flex space-x-2">
                                <button 
                                    @click="copyToClipboard(response)"
                                    class="flex-1 bg-blue-500/20 text-blue-300 py-2 px-4 rounded-lg hover:bg-blue-500/30 transition-colors flex items-center justify-center"
                                >
                                    <i class="fas fa-copy mr-2"></i>
                                    Copy
                                </button>
                                <button 
                                    @click="response = ''"
                                    class="flex-1 bg-red-500/20 text-red-300 py-2 px-4 rounded-lg hover:bg-red-500/30 transition-colors flex items-center justify-center"
                                >
                                    <i class="fas fa-trash mr-2"></i>
                                    Clear
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Model Info -->
                    <div class="bg-white/5 backdrop-blur-lg rounded-2xl p-6 border border-white/10 mt-6">
                        <h3 class="text-lg font-semibold text-white mb-3 flex items-center">
                            <i class="fas fa-info-circle mr-2 text-blue-400"></i>
                            Model Info
                        </h3>
                        <template x-for="model in models" :key="model.id">
                            <div x-show="selectedModel === model.id">
                                <div class="space-y-2">
                                    <p class="text-sm text-gray-300">
                                        <span class="font-medium">Provider:</span> 
                                        <span x-text="model.provider"></span>
                                    </p>
                                    <p class="text-sm text-gray-300">
                                        <span class="font-medium">Type:</span> 
                                        <span x-text="model.type"></span>
                                    </p>
                                    <p class="text-sm text-gray-300">
                                        <span class="font-medium">Limit:</span> 
                                        <span x-text="model.limit"></span>
                                    </p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- History Section -->
            <div class="mt-8 bg-white/5 backdrop-blur-lg rounded-2xl p-6 border border-white/10">
                <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <i class="fas fa-history mr-3 text-yellow-400"></i>
                    History
                </h2>
                
                <div x-show="history.length === 0" class="text-center py-8">
                    <i class="fas fa-clock text-4xl text-gray-600 mb-4"></i>
                    <p class="text-gray-400">Belum ada history</p>
                </div>

                <div x-show="history.length > 0" class="space-y-4">
                    <template x-for="(item, index) in history.slice().reverse()" :key="index">
                        <div class="bg-black/20 rounded-xl p-4 border border-white/10">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-sm text-purple-300" x-text="item.model"></span>
                                <span class="text-xs text-gray-400" x-text="item.timestamp"></span>
                            </div>
                            <p class="text-white text-sm mb-2" x-text="item.prompt.substring(0, 100) + (item.prompt.length > 100 ? '...' : '')"></p>
                            <p class="text-gray-300 text-sm" x-text="item.response.substring(0, 150) + (item.response.length > 150 ? '...' : '')"></p>
                            <button 
                                @click="loadFromHistory(item)"
                                class="mt-2 text-xs bg-purple-500/20 text-purple-300 px-2 py-1 rounded hover:bg-purple-500/30 transition-colors"
                            >
                                Load
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Toast Notification -->
        <div 
            x-show="showToast" 
            x-transition
            class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg"
        >
            <span x-text="toastMessage"></span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
